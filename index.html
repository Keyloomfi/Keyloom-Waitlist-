<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Keyloom — Join the Early Access List</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<!-- EmailJS — replace YOUR_PUBLIC_KEY with your key -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  try { emailjs.init('YOUR_PUBLIC_KEY'); } catch(e) { console.warn('[EmailJS] Not connected:', e.message); }
</script>

<!-- Supabase — replace credentials below -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── REPLACE THESE TWO VALUES ──
  // Find at: supabase.com/dashboard → your project → Settings → API
  const SUPABASE_URL  = 'YOUR_SUPABASE_PROJECT_URL';    // e.g. https://xxxx.supabase.co
  const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_PUBLIC_KEY'; // starts with eyJ...

  let _supabase = null;
  try {
    if (SUPABASE_URL !== 'YOUR_SUPABASE_PROJECT_URL') {
      _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
      console.log('[Supabase] Connected.');
    } else {
      console.warn('[Supabase] Not connected — add credentials to activate.');
    }
  } catch(e) { console.warn('[Supabase] Init error:', e.message); }

  // ── TABLE SETUP (run once in Supabase SQL editor) ──
  // CREATE TABLE IF NOT EXISTS waitlist (
  //   id          bigint generated always as identity primary key,
  //   first_name  text not null,
  //   email       text not null unique,
  //   state       text not null,
  //   created_at  timestamptz not null default now()
  // );
  // ALTER TABLE waitlist ENABLE ROW LEVEL SECURITY;
  // CREATE POLICY "allow_insert" ON waitlist FOR INSERT WITH CHECK (true);
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#0d9488;
  --teal-mid:#0f766e;
  --teal-pale:#f0faf8;
  --teal-light:#ccfbf1;
  --gold-light:#F5A623;
  --text-dark:#0A2825;
  --text-mid:#3A5452;
  --text-muted:#7A9896;
  --border:#d1f0eb;
  --surface:#f0faf8;
  --white:#FFFFFF;
  --off-white:#f8fffe;
  --r-sm:10px;
  --r-md:16px;
  --r-lg:22px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;color:var(--text-dark);background:var(--off-white);line-height:1.6;overflow-x:hidden}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:#ffffff;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 5%}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--teal);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-size:18px;font-weight:800;color:var(--text-dark);letter-spacing:-0.02em}
.nav-btn{background:var(--teal);color:#fff;border:none;border-radius:50px;padding:10px 22px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .18s}
.nav-btn:hover{background:var(--teal-mid)}

/* ── HERO ── */
.hero{padding:72px 5% 60px;background:#f0faf8;text-align:center}
.hero-inner{max-width:560px;margin:0 auto}
.pill{display:inline-block;font-size:11px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);background:var(--teal-pale);border:1px solid var(--teal-light);border-radius:40px;padding:5px 15px;margin-bottom:20px}
.hero h1{font-size:clamp(32px,6vw,52px);font-weight:800;color:var(--text-dark);letter-spacing:-0.03em;line-height:1.08;margin-bottom:16px}
.hero-sub{font-size:16px;color:var(--text-mid);line-height:1.7;margin-bottom:32px;max-width:460px;margin-left:auto;margin-right:auto}
.hero-form-area{max-width:400px;margin:0 auto}
.hero-note{font-size:12px;color:var(--text-muted);margin-top:10px;line-height:1.55}

/* ── POPUP BUTTON (triggers modal) ── */
.btn-join{display:block;width:100%;background:var(--teal);color:#fff;border:none;border-radius:50px;padding:15px 24px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(13,107,94,0.28);transition:all .18s;letter-spacing:0.01em}
.btn-join:hover{background:var(--teal-mid);box-shadow:0 6px 22px rgba(13,107,94,0.36)}
.btn-join:active{transform:scale(0.98)}
.btn-join.white{background:#fff;color:var(--teal);box-shadow:0 4px 14px rgba(0,0,0,0.1)}
.btn-join.white:hover{background:#F0FAF8}

/* ── POPUP MODAL ── */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(10,40,35,0.62);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:20px}
.popup-overlay.open{display:flex}
.popup-box{background:#fff;border-radius:20px;max-width:420px;width:100%;padding:32px 28px;position:relative;box-shadow:0 24px 60px rgba(0,0,0,0.22)}
.popup-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border:1.5px solid var(--border);border-radius:50%;background:none;cursor:pointer;font-size:14px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .18s}
.popup-close:hover{border-color:var(--teal);color:var(--teal)}
.popup-headline{font-size:22px;font-weight:800;color:var(--text-dark);letter-spacing:-0.02em;margin-bottom:6px;line-height:1.2}
.popup-sub{font-size:14px;color:var(--text-muted);margin-bottom:22px;line-height:1.55}
.popup-input{width:100%;border:2px solid var(--border);border-radius:var(--r-md);padding:14px 16px;font-family:inherit;font-size:15px;color:var(--text-dark);outline:none;transition:border-color .2s;background:#fff;display:block;margin-bottom:12px;-webkit-appearance:none}
.popup-input:focus{border-color:var(--teal)}
.popup-input::placeholder{color:var(--text-muted)}
.popup-input.err{border-color:#EF4444}
.field-err{font-size:12px;color:#EF4444;margin-top:-8px;margin-bottom:10px;display:none}
.field-err.show{display:block}
.btn-popup{display:block;width:100%;background:var(--teal);color:#fff;border:none;border-radius:50px;padding:15px 24px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(13,107,94,0.28);transition:all .18s;margin-bottom:10px}
.btn-popup:hover{background:var(--teal-mid)}
.btn-popup:active{transform:scale(0.98)}
.popup-note{font-size:12px;color:var(--text-muted);text-align:center;line-height:1.55}
/* Confirm state */
.popup-confirm{display:none;text-align:center}
.popup-confirm-num{font-size:24px;font-weight:800;color:var(--text-dark);letter-spacing:-0.02em;margin-bottom:10px;line-height:1.25}
.popup-confirm-msg{font-size:14px;color:var(--text-muted);line-height:1.65;margin-bottom:20px}
.popup-code-box{background:var(--teal-pale);border:2px solid var(--teal-light);border-radius:var(--r-md);padding:16px 18px;text-align:left}
.popup-code-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.popup-code{font-size:22px;font-weight:800;color:var(--teal);letter-spacing:0.06em;margin-bottom:6px}
.popup-code-fine{font-size:11.5px;color:var(--text-muted);line-height:1.55}

/* ── TRUST STRIP ── */
.trust-strip{padding:22px 5%;background:var(--white);border-bottom:1px solid var(--border)}
.trust-inner{max-width:640px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.trust-item{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}
.trust-icon{font-size:20px;line-height:1}
.trust-label{font-size:11.5px;font-weight:600;color:var(--text-mid)}

/* ── SECTIONS ── */
.section{padding:72px 5%;background:var(--white)}
.section-inner{max-width:900px;margin:0 auto}
.section-label{font-size:11px;font-weight:800;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;text-align:center}
.section-title{font-size:clamp(22px,3.5vw,34px);font-weight:800;color:var(--text-dark);letter-spacing:-0.025em;line-height:1.2;margin-bottom:40px;text-align:center}

/* ── 2x2 CARDS ── */
.cards-2x2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:26px 22px;text-align:left}
.card-icon{font-size:26px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:800;color:var(--text-dark);margin-bottom:7px;letter-spacing:-0.01em}
.card-desc{font-size:13.5px;color:var(--text-mid);line-height:1.65}

/* ── SAGE ── */
.sage-wrap{max-width:460px;margin:0 auto}
.sage-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:22px 20px;box-shadow:0 4px 20px rgba(13,107,94,0.07)}
.sage-header{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:18px}
.sage-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-mid));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sage-name{font-size:14px;font-weight:800;color:var(--text-dark)}
.sage-tag{font-size:11px;color:var(--text-muted);font-weight:500}
.chat{display:flex;flex-direction:column;gap:11px;margin-bottom:20px}
.bubble{padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.6;max-width:86%}
.bubble.sage-b{background:#F0F9F7;color:var(--text-dark);border-bottom-left-radius:4px;align-self:flex-start}
.bubble.user-b{background:var(--teal);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.sage-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--teal-pale);border-radius:10px;padding:11px 8px;text-align:center}
.stat-num{font-size:13px;font-weight:800;color:var(--teal);line-height:1}
.stat-lbl{font-size:10.5px;color:var(--text-muted);margin-top:3px;font-weight:500}
/* Typing dots */
.typing-bubble{display:inline-flex;align-items:center;gap:5px;padding:12px 16px;background:#F0F9F7;border-radius:16px;border-bottom-left-radius:4px;align-self:flex-start}
.t-dot{width:7px;height:7px;border-radius:50%;background:var(--teal-mid);opacity:0.3;animation:tdot 1.3s ease-in-out infinite}
.t-dot:nth-child(1){animation-delay:0s}
.t-dot:nth-child(2){animation-delay:0.2s}
.t-dot:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,60%,100%{opacity:0.3;transform:scale(1)}30%{opacity:1;transform:scale(1.18)}}

/* ── GAUGE ── */
.gauge-wrap-outer{max-width:340px;margin:0 auto}
.score-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:24px 20px;box-shadow:0 4px 20px rgba(13,107,94,0.07)}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sc-title{font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted)}
.sc-badge{font-size:11px;font-weight:700;background:var(--teal-pale);color:var(--teal);border-radius:20px;padding:3px 10px}
.gauge-svg-wrap{position:relative;width:180px;height:100px;margin:0 auto 4px}
.gauge-score-inner{position:absolute;bottom:0;left:50%;transform:translateX(-50%);text-align:center}
.g-num{font-size:38px;font-weight:800;color:var(--text-dark);letter-spacing:-0.04em;line-height:1}
.g-sub{font-size:10px;color:var(--text-muted);font-weight:600}
.score-status{display:inline-flex;align-items:center;gap:6px;background:var(--teal-pale);color:var(--teal);border-radius:40px;padding:6px 14px;font-size:13px;font-weight:700;margin:8px 0 14px}
.s-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0}
.bars{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{font-size:12px;color:var(--text-mid);font-weight:500;width:54px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:var(--surface);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px}
.bar-val{font-size:12px;font-weight:700;color:var(--text-dark);width:20px;text-align:right;flex-shrink:0}

/* ── WHO GRID ── */
.who-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.who-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-md);padding:18px 16px;display:flex;align-items:flex-start;gap:12px}
.who-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.who-title{font-size:14px;font-weight:800;color:var(--text-dark);margin-bottom:3px}
.who-desc{font-size:13px;color:var(--text-mid);line-height:1.55}

/* ── CTA ── */
.cta-section{padding:72px 5%;background:linear-gradient(135deg,var(--teal) 0%,var(--teal-mid) 100%);text-align:center}
.cta-inner{max-width:440px;margin:0 auto}
.cta-section h2{font-size:clamp(24px,4vw,38px);font-weight:800;color:#fff;letter-spacing:-0.025em;line-height:1.15;margin-bottom:10px}
.cta-sub{font-size:15px;color:rgba(255,255,255,0.7);margin-bottom:28px;line-height:1.65}
.cta-tagline{font-size:12px;color:rgba(255,255,255,0.42);margin-top:20px;font-weight:500}

/* ── FOOTER ── */
footer{background:#0a7a70;padding:40px 5% 28px}
.footer-inner{max-width:960px;margin:0 auto}
.footer-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:10px}
.footer-logo .logo-text{color:#fff}
.footer-desc{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.65;margin-bottom:6px}
.footer-tagline-txt{font-size:11px;font-weight:700;letter-spacing:0.07em;color:rgba(255,255,255,0.85);text-transform:uppercase;margin-bottom:28px}
.footer-links{display:flex;flex-wrap:wrap;gap:6px 18px;margin-bottom:24px}
.footer-links a{font-size:13px;color:#fff;text-decoration:none;transition:color .2s}
.footer-links a:hover{color:rgba(255,255,255,0.75)}
.footer-divider{height:1px;background:rgba(255,255,255,0.2);margin-bottom:16px}
.footer-nexqual{font-size:12px;font-weight:500;color:rgba(255,255,255,0.7);text-align:center;letter-spacing:0.03em;margin-bottom:12px;pointer-events:none;user-select:none;opacity:1}
.footer-copy{font-size:12px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.6}
.footer-copy .tc{color:rgba(255,255,255,0.6)}

/* ── RESPONSIVE ── */
@media(max-width:620px){
  .trust-inner{grid-template-columns:repeat(2,1fr);gap:14px}
  .cards-2x2,.who-grid{grid-template-columns:1fr}
  .section{padding:56px 5%}
  .hero{padding:60px 5% 52px}
  .cta-section{padding:60px 5%}
  .popup-box{padding:26px 20px}
}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .48s ease,transform .48s ease}
.reveal.vis{opacity:1;transform:none}

/* ── TOOLS DROPDOWN NAV ── */
.tools-dropdown-wrap{position:relative}
.tools-btn{background:none;border:1.5px solid var(--border);border-radius:50px;padding:9px 18px;font-family:inherit;font-size:14px;font-weight:700;color:var(--text-dark);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .18s;white-space:nowrap}
.tools-btn:hover,.tools-btn.open{border-color:var(--teal);color:var(--teal)}
.tools-btn-arrow{font-size:10px;display:inline-block;transition:transform .2s}
.tools-btn.open .tools-btn-arrow{transform:rotate(180deg)}
.tools-menu{display:none;position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1.5px solid var(--border);border-radius:14px;box-shadow:0 8px 28px rgba(10,40,35,0.12);min-width:220px;z-index:300;overflow:hidden}
.tools-menu.show{display:block}
.tools-menu-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-family:inherit;font-size:14px;font-weight:600;color:var(--text-dark);cursor:pointer;background:none;border:none;width:100%;text-align:left;transition:background .15s}
.tools-menu-item:hover{background:var(--teal-pale);color:var(--teal)}
.tools-menu-item-icon{font-size:16px;flex-shrink:0}

/* ── TOOL MODAL BASE ── */
.tool-overlay{display:none;position:fixed;inset:0;background:rgba(10,40,35,0.62);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:400;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.tool-overlay.open{display:flex}
.tool-box{background:#fff;border-radius:20px;max-width:520px;width:100%;margin:auto;box-shadow:0 24px 60px rgba(0,0,0,0.2);overflow:hidden}
.tool-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 16px;border-bottom:1px solid var(--border)}
.tool-header-left{display:flex;align-items:center;gap:8px}
.tool-header-logo{width:26px;height:26px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tool-header-brand{font-size:13px;font-weight:800;color:var(--text-dark)}
.tool-header-sep{font-size:13px;color:var(--text-muted);margin:0 2px}
.tool-header-name{font-size:13px;font-weight:700;color:var(--teal)}
.tool-close{width:30px;height:30px;border:1.5px solid var(--border);border-radius:50%;background:none;cursor:pointer;font-size:14px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0;transition:all .18s}
.tool-close:hover{border-color:var(--teal);color:var(--teal)}
.tool-body{padding:22px 22px 28px;max-height:82vh;overflow-y:auto}

/* ── TOOL INPUTS ── */
.t-section{margin-bottom:18px}
.t-label{font-size:12px;font-weight:700;color:var(--text-dark);margin-bottom:5px;display:block;letter-spacing:0.01em}
.t-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:15px;color:var(--text-dark);outline:none;transition:border-color .2s;background:#fff;-webkit-appearance:none;display:block}
.t-input:focus{border-color:var(--teal)}
.t-input::placeholder{color:var(--text-muted)}
.t-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.t-seg{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.t-seg button{flex:1;padding:11px 4px;font-family:inherit;font-size:12px;font-weight:600;background:#fff;border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--text-mid);transition:all .18s}
.t-seg button:last-child{border-right:none}
.t-seg button.active{background:var(--teal);color:#fff}
.t-toggle{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-mid);margin-bottom:4px}
.t-toggle input[type=checkbox]{accent-color:var(--teal);width:16px;height:16px}

/* ── TOOL RESULTS ── */
.t-result-box{background:var(--teal-pale);border:1.5px solid var(--teal-light);border-radius:14px;padding:18px 16px;margin-bottom:14px}
.t-result-big{font-size:30px;font-weight:800;color:var(--teal);letter-spacing:-0.03em;margin-bottom:2px}
.t-result-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em}
.t-result-rows{margin-top:12px}
.t-result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(13,107,94,0.12)}
.t-result-row:last-child{border-bottom:none}
.t-result-key{font-size:13px;color:var(--text-mid)}
.t-result-val{font-size:13px;font-weight:700;color:var(--text-dark)}
.t-indicator{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:40px;font-size:12px;font-weight:700;margin-bottom:10px}
.t-indicator.green{background:#DCFCE7;color:#166534}
.t-indicator.yellow{background:#FEF9C3;color:#854D0E}
.t-indicator.red{background:#FEE2E2;color:#991B1B}
.t-callout{background:#F0FAF8;border:1.5px solid var(--teal-light);border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:var(--text-mid);line-height:1.65}
.t-callout strong{color:var(--teal)}
.t-disclaimer{font-size:11px;color:var(--text-muted);line-height:1.65;margin:14px 0}
.t-cta{display:block;width:100%;background:var(--teal);color:#fff;border:none;border-radius:50px;padding:14px 20px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;text-align:center;transition:all .18s;margin-bottom:4px}
.t-cta:hover{background:var(--teal-mid)}

/* ── DONUT CHART ── */
.donut-row{display:flex;align-items:center;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.donut-wrap{position:relative;width:110px;height:110px;flex-shrink:0}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.donut-legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-mid)}
.donut-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── AMORTIZATION TABLE ── */
.amort-table-wrap{max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.amort-table{width:100%;border-collapse:collapse;font-size:11.5px}
.amort-table th{background:var(--surface);padding:7px 8px;text-align:right;font-weight:700;color:var(--text-mid);position:sticky;top:0;border-bottom:1px solid var(--border);white-space:nowrap}
.amort-table th:first-child{text-align:left}
.amort-table td{padding:6px 8px;text-align:right;color:var(--text-dark);border-bottom:1px solid var(--border)}
.amort-table td:first-child{text-align:left;color:var(--text-muted)}
.amort-toggle{display:flex;gap:8px;margin-bottom:10px}
.amort-toggle button{font-family:inherit;font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--text-mid);transition:all .18s}
.amort-toggle button.active{background:var(--teal);color:#fff;border-color:var(--teal)}

/* ── HEALTH CHECK CARDS ── */
.hc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.hc-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:13px}
.hc-card-title{font-size:10px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.hc-card-val{font-size:18px;font-weight:800;color:var(--text-dark);letter-spacing:-0.02em;margin-bottom:3px}
.hc-card-sub{font-size:11px;color:var(--text-muted);line-height:1.5;margin-bottom:6px}
.hc-source{font-size:9.5px;color:var(--text-muted);font-style:italic}
.hc-insight{background:var(--teal-pale);border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:var(--text-mid);line-height:1.7}

@media(max-width:520px){
  .t-row{grid-template-columns:1fr}
  .hc-grid{grid-template-columns:1fr}
  .tool-body{padding:16px 16px 22px;max-height:88vh}
  .tools-menu{left:auto;right:0}
}
</head>

<script>
// ── WAITLIST COUNT — persisted in localStorage ──
function getCount() {
  return parseInt(localStorage.getItem('keyloom_waitlist_count') || '0');
}
function incrementCount() {
  const next = getCount() + 1;
  localStorage.setItem('keyloom_waitlist_count', next);
  return next;
}

// ── POPUP ──
async function openPopup() {
  document.getElementById('popup').classList.add('open');
  document.body.style.overflow = 'hidden';
  const alreadyJoined = localStorage.getItem('keyloom_joined');
  if (alreadyJoined) {
    try {
      if (_supabase) {
        const { count } = await _supabase.from('waitlist').select('*', { count: 'exact', head: true });
        showConfirm(count || getCount());
      } else {
        showConfirm(getCount());
      }
    } catch(e) { showConfirm(getCount()); }
  }
}
function closePopup() {
  document.getElementById('popup').classList.remove('open');
  document.body.style.overflow = '';
}
function handlePopupBg(e) {
  if (e.target === document.getElementById('popup')) closePopup();
}

// ── POPUP FORM LIVE VALIDATION ──
function checkPopupForm() {
  const name = document.getElementById('p-name').value.trim();
  const state = document.getElementById('p-state').value;
  const email = document.getElementById('p-email').value.trim();
  const emailOk = email && email.includes('@') && email.includes('.') && email.length >= 5;
  const btn = document.getElementById('btn-popup-submit');
  if (name && state && emailOk) {
    btn.style.background = '';
    btn.style.boxShadow = '';
    btn.style.cursor = '';
    btn.style.pointerEvents = '';
  } else {
    btn.style.background = '#C5D9D6';
    btn.style.boxShadow = 'none';
    btn.style.cursor = 'not-allowed';
    btn.style.pointerEvents = 'none';
  }
}

// ── POPUP SUBMIT — SUPABASE CONNECTED ──
async function popupSubmit() {
  const name  = document.getElementById('p-name').value.trim();
  const state = document.getElementById('p-state').value;
  const email = document.getElementById('p-email').value.trim();
  let valid = true;

  const nameErr  = document.getElementById('err-name');
  if (!name)  { document.getElementById('p-name').classList.add('err');  nameErr.classList.add('show');  valid = false; }
  else        { document.getElementById('p-name').classList.remove('err'); nameErr.classList.remove('show'); }

  const stateErr = document.getElementById('err-state');
  if (!state) { document.getElementById('p-state').classList.add('err'); stateErr.classList.add('show'); valid = false; }
  else        { document.getElementById('p-state').classList.remove('err'); stateErr.classList.remove('show'); }

  // Reset email error text in case it was changed by duplicate check
  const emailErrEl = document.getElementById('err-email');
  emailErrEl.textContent = 'Please enter a valid email address';
  const emailOk = email && email.includes('@') && email.includes('.') && email.length >= 5;
  if (!emailOk) { document.getElementById('p-email').classList.add('err'); emailErrEl.classList.add('show'); valid = false; }
  else          { document.getElementById('p-email').classList.remove('err'); emailErrEl.classList.remove('show'); }

  if (!valid) return;

  // Hide any previous submit error
  document.getElementById('err-submit').classList.remove('show');

  // Loading state on button
  const btn = document.getElementById('btn-popup-submit');
  const origText = btn.textContent;
  btn.textContent = 'Saving…';
  btn.style.pointerEvents = 'none';

  try {
    let displayCount = getCount() + 1;

    if (_supabase) {
      // ── Supabase path ──
      const { error: insertError } = await _supabase
        .from('waitlist')
        .insert([{ first_name: name, email: email, state: state }]);

      if (insertError) {
        if (insertError.code === '23505') {
          document.getElementById('p-email').classList.add('err');
          emailErrEl.textContent = 'You are already on the waitlist. Check your email for your confirmation.';
          emailErrEl.classList.add('show');
          btn.textContent = origText;
          btn.style.pointerEvents = '';
          return;
        }
        throw insertError;
      }
      const { count: liveCount } = await _supabase
        .from('waitlist')
        .select('*', { count: 'exact', head: true });
      displayCount = liveCount || displayCount;
    } else {
      // ── Offline fallback — localStorage only ──
      displayCount = incrementCount();
      console.log('[Keyloom Waitlist] Supabase not connected — saved locally.');
    }

    localStorage.setItem('keyloom_joined', '1');
    localStorage.setItem('keyloom_signup_data', JSON.stringify({ name, state, email, count: displayCount, ts: new Date().toISOString() }));
    console.log('[Keyloom Waitlist] Signup:', { name, state, email, count: displayCount });

    // ── KLAVIYO INTEGRATION POINT ──
    // klaviyo.identify({ '$email': email, '$first_name': name, 'State': state });
    // klaviyo.track('Waitlist Signup', { email, name, state, count: displayCount, code: 'KEYLOOM5' });
    sendConfirmationEmail(name, state, email, displayCount);
    showConfirm(displayCount);

  } catch (err) {
    console.error('[Keyloom Waitlist] Error:', err);
    document.getElementById('err-submit').classList.add('show');
    btn.textContent = origText;
    btn.style.pointerEvents = '';
  }
}

function resetPopupForm() {
  // Clear all fields
  document.getElementById('p-name').value = '';
  document.getElementById('p-email').value = '';
  document.getElementById('p-state').value = '';
  // Remove error states
  ['p-name','p-email','p-state'].forEach(id => document.getElementById(id).classList.remove('err'));
  ['err-name','err-email','err-state','err-submit'].forEach(id => document.getElementById(id).classList.remove('show'));
  // Reset email error text in case it was changed by duplicate message
  document.getElementById('err-email').textContent = 'Please enter a valid email address';
  // Re-lock button
  const btn = document.getElementById('btn-popup-submit');
  btn.style.background = '#C5D9D6';
  btn.style.boxShadow = 'none';
  btn.style.cursor = 'not-allowed';
  btn.style.pointerEvents = 'none';
  // Swap screens
  document.getElementById('popup-confirm').style.display = 'none';
  document.getElementById('popup-form').style.display = 'block';
  // Clear joined flag so re-submit counts fresh
  localStorage.removeItem('keyloom_joined');
}

function showConfirm(count) {
  document.getElementById('popup-form').style.display = 'none';
  document.getElementById('waitlist-num').textContent = count;
  document.getElementById('popup-confirm').style.display = 'block';
}
// ── EMAILJS SEND ──
// ── EMAILJS INTEGRATION POINT ──
// STEP 1: Sign up at https://emailjs.com (free tier supports 200 emails/month)
// STEP 2: Create a service (Gmail, Outlook, SMTP) → copy the Service ID
// STEP 3: Create an email template → copy the Template ID
//         Template variables to use: {{to_name}}, {{to_email}}, {{waitlist_num}}, {{early_code}}
// STEP 4: Go to Account → API Keys → copy your Public Key
// STEP 5: Replace the three placeholder strings below:

//         'YOUR_SERVICE_ID'  → first argument of emailjs.send() below

function sendConfirmationEmail(name, state, email, count) {

    to_name: name,

    // ── EMAIL TEMPLATE CONTENT ──
    // Subject: "You are on the Keyloom waitlist 🏠"

    //   You are officially on the Keyloom early access list.
    //   We are building something that has never existed in this industry —

    //   Just clarity on exactly where you stand.

    //   {{early_code}} — 25% off your first month of Keyloom Verified
    //   Keep this code. It is yours.
    //   Zero Spam Calls. Zero Pressure. Just Clarity.
    //   — The Keyloom Team · keyloom.co
  }).then(
    () => console.log('[EmailJS] Confirmation sent to', email),
    (err) => console.warn('[EmailJS] Not connected yet — add credentials to activate:', err)

}

// ── HELPERS ──
const fmt=n=>isNaN(n)?'—':'$'+Math.round(n).toLocaleString();
const fmtPct=n=>isNaN(n)?'—':n.toFixed(1)+'%';

// ════════════════════════════════════════
// TOOL 1 — EQUITY CALCULATOR
// ════════════════════════════════════════
let eqType='conv';
function setEqType(btn,type){
  eqType=type;
  document.querySelectorAll('#eq-type button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  calcEquity();
}
function calcEquity(){
  const val=parseFloat(document.getElementById('eq-value').value)||0;
  const bal=parseFloat(document.getElementById('eq-balance').value)||0;
  if(!val||!bal){document.getElementById('eq-results').style.display='none';return;}
  document.getElementById('eq-results').style.display='block';
  const equity=val-bal;
  const pct=(equity/val)*100;
  document.getElementById('eq-equity-amt').textContent=fmt(equity);
  document.getElementById('eq-equity-pct').textContent=fmtPct(pct)+' equity';
  document.getElementById('eq-r-value').textContent=fmt(val);
  document.getElementById('eq-r-balance').textContent=fmt(bal);
  // Indicator
  const ind=document.getElementById('eq-indicator');
  ind.className='t-indicator '+(pct>=20?'green':pct>=10?'yellow':'red');
  ind.textContent=(pct>=20?'● Strong — 20%+ Equity':pct>=10?'● Building — 10–19% Equity':'● Low — Under 10% Equity');
  // Available
  const vaCallout=document.getElementById('eq-va-callout');
  const ltvNote=document.getElementById('eq-ltv-note');
  vaCallout.style.display='none';ltvNote.style.display='none';
  let available=0;
  if(eqType==='va'){
    available=val-bal;
    vaCallout.style.display='block';
    document.getElementById('eq-available').textContent=fmt(available>0?available:0)+' (up to 100% LTV)';
  } else {
    available=(val*0.8)-bal;
    if(available<=0){
      document.getElementById('eq-available').textContent='Not yet at 80% LTV';
      ltvNote.style.display='block';
      ltvNote.textContent='You have not yet reached 80% LTV to access equity. Continue building equity and check back.';
    } else {
      document.getElementById('eq-available').textContent=fmt(available);
    }
  }
}

// ════════════════════════════════════════
// TOOL 2 — MORTGAGE CALCULATOR
// ════════════════════════════════════════
let moTerm=30;
function setTerm(btn,t){moTerm=t;document.querySelectorAll('#mo-term button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');calcMortgage();}
function syncDP(src){
  const price=parseFloat(document.getElementById('mo-price').value)||0;
  if(src==='price'||src==='amt'){
    const amt=parseFloat(document.getElementById('mo-dp-amt').value)||0;
    if(price>0)document.getElementById('mo-dp-pct').value=((amt/price)*100).toFixed(1);
  }
  if(src==='pct'){
    const pct=parseFloat(document.getElementById('mo-dp-pct').value)||0;
    if(price>0)document.getElementById('mo-dp-amt').value=Math.round(price*(pct/100));
  }
}
function calcMortgage(){
  const price=parseFloat(document.getElementById('mo-price').value)||0;
  const dpAmt=parseFloat(document.getElementById('mo-dp-amt').value)||0;
  const rate=parseFloat(document.getElementById('mo-rate').value)||0;
  const tax=parseFloat(document.getElementById('mo-tax').value)||0;
  const ins=parseFloat(document.getElementById('mo-ins').value)||0;
  const hoa=parseFloat(document.getElementById('mo-hoa').value)||0;
  if(!price||!rate){document.getElementById('mo-results').style.display='none';return;}
  const loanAmt=price-dpAmt;
  const dpPct=(dpAmt/price)*100;
  const r=(rate/100)/12;
  const n=moTerm*12;
  const pi=loanAmt*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  const mTax=tax/12;
  const mIns=ins/12;
  const pmiChk=document.getElementById('mo-pmi-chk');
  let mPMI=0;
  if(dpPct<20&&pmiChk.checked){mPMI=(loanAmt*0.0085)/12;}
  // Auto-check PMI if dp < 20
  if(dpPct<20&&!pmiChk.checked){pmiChk.checked=true;mPMI=(loanAmt*0.0085)/12;}
  if(dpPct>=20){pmiChk.checked=false;mPMI=0;}
  const total=pi+mTax+mIns+hoa+mPMI;
  document.getElementById('mo-results').style.display='block';
  document.getElementById('mo-total').textContent=fmt(total)+'/mo';
  const rows=[
    ['Principal & Interest',pi],['Property Taxes',mTax],
    ['Insurance',mIns],['HOA',hoa],['PMI',mPMI]
  ].filter(r=>r[1]>0);
  document.getElementById('mo-breakdown').innerHTML=rows.map(([k,v])=>
    `<div class="t-result-row"><span class="t-result-key">${k}</span><span class="t-result-val">${fmt(v)}/mo</span></div>`
  ).join('');
  const totalInterest=pi*n-loanAmt;
  document.getElementById('mo-totals').innerHTML=`
    <div class="t-result-row"><span class="t-result-key">Total Interest Paid</span><span class="t-result-val">${fmt(totalInterest)}</span></div>
    <div class="t-result-row"><span class="t-result-key">Total Cost of Loan</span><span class="t-result-val">${fmt(loanAmt+totalInterest)}</span></div>`;
  // Donut chart
  drawDonut('mo-donut',rows,'mo-legend',total);
}
const DONUT_COLORS=['#0d9488','#2dd4bf','#5eead4','#99f6e4','#ccfbf1'];
function drawDonut(canvasId,rows,legendId,total){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const cx=55,cy=55,r=48,ir=32;
  ctx.clearRect(0,0,110,110);
  let start=-Math.PI/2;
  rows.forEach(([k,v],i)=>{
    const slice=(v/total)*2*Math.PI;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+slice);
    ctx.closePath();ctx.fillStyle=DONUT_COLORS[i%DONUT_COLORS.length];ctx.fill();
    start+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,ir,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
  document.getElementById(legendId).innerHTML=rows.map(([k,v],i)=>
    `<div class="donut-legend-item"><div class="donut-dot" style="background:${DONUT_COLORS[i%DONUT_COLORS.length]}"></div><span>${k}: ${((v/total)*100).toFixed(0)}%</span></div>`
  ).join('');
}

// ════════════════════════════════════════
// TOOL 3 — AMORTIZATION CALCULATOR
// ════════════════════════════════════════
let amTerm=30, amView='monthly', amSchedule=[];
function setAmTerm(btn,t){amTerm=t;document.querySelectorAll('#am-term button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');calcAmort();}
function setAmView(btn,v){amView=v;document.querySelectorAll('.amort-toggle button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAmortTable();}
function calcAmort(){
  const amt=parseFloat(document.getElementById('am-amount').value)||0;
  const rate=parseFloat(document.getElementById('am-rate').value)||0;
  const extra=parseFloat(document.getElementById('am-extra').value)||0;
  const startMonth=parseInt(document.getElementById('am-month').value)||0;
  const startYear=parseInt(document.getElementById('am-year').value)||new Date().getFullYear();
  if(!amt||!rate){document.getElementById('am-results').style.display='none';return;}
  document.getElementById('am-results').style.display='block';
  const r=(rate/100)/12;
  const n=amTerm*12;
  const pmt=amt*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  document.getElementById('am-pmt').textContent=fmt(pmt+(extra||0))+'/mo';
  // Build schedule without extra
  let bal=amt,totalInt=0;
  amSchedule=[];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for(let i=0;i<n;i++){
    const intPmt=bal*r;
    const prinPmt=Math.min(pmt-intPmt,bal);
    bal=Math.max(0,bal-prinPmt);
    totalInt+=intPmt;
    const mIdx=(startMonth+i)%12;
    const yr=startYear+Math.floor((startMonth+i)/12);
    amSchedule.push({month:i+1,label:months[mIdx]+' '+yr,yr,principal:prinPmt,interest:intPmt,balance:bal});
    if(bal<=0)break;
  }
  const payoffDate=amSchedule[amSchedule.length-1].label;
  document.getElementById('am-summary').innerHTML=`
    <div class="t-result-row"><span class="t-result-key">Total Interest</span><span class="t-result-val">${fmt(totalInt)}</span></div>
    <div class="t-result-row"><span class="t-result-key">Total Paid</span><span class="t-result-val">${fmt(amt+totalInt)}</span></div>
    <div class="t-result-row"><span class="t-result-key">Payoff Date</span><span class="t-result-val">${payoffDate}</span></div>`;
  // Extra payment impact
  const extraBox=document.getElementById('am-extra-box');
  if(extra>0){
    let bal2=amt,totalInt2=0,months2=0;
    for(let i=0;i<n*2;i++){
      const intPmt=bal2*r;
      const prinPmt=Math.min(pmt+extra-intPmt,bal2);
      bal2=Math.max(0,bal2-prinPmt);
      totalInt2+=intPmt;months2++;
      if(bal2<=0)break;
    }
    const saved=totalInt-totalInt2;
    const moSaved=amSchedule.length-months2;
    const yrsSaved=Math.floor(moSaved/12);
    const moRem=moSaved%12;
    extraBox.style.display='block';
    extraBox.innerHTML=`<strong style="color:var(--teal)">With ${fmt(extra)}/mo extra:</strong><br>
    You save <strong style="color:var(--teal)">${fmt(saved)}</strong> in interest and pay off <strong style="color:var(--teal)">${yrsSaved>0?yrsSaved+'yr ':''} ${moRem>0?moRem+'mo':''}${yrsSaved===0&&moRem===0?'earlier':' earlier'}</strong>.`;
  } else {
    extraBox.style.display='none';
  }
  renderAmortTable();
}
function renderAmortTable(){
  if(!amSchedule.length)return;
  const thead=document.getElementById('am-thead');
  const tbody=document.getElementById('am-tbody');
  if(amView==='monthly'){
    thead.innerHTML='<tr><th>Period</th><th>Principal</th><th>Interest</th><th>Balance</th></tr>';
    tbody.innerHTML=amSchedule.map(r=>`<tr><td>${r.label}</td><td>${fmt(r.principal)}</td><td>${fmt(r.interest)}</td><td>${fmt(r.balance)}</td></tr>`).join('');
  } else {
    // Group by year
    const byYear={};
    amSchedule.forEach(r=>{if(!byYear[r.yr])byYear[r.yr]={yr:r.yr,principal:0,interest:0,balance:0};byYear[r.yr].principal+=r.principal;byYear[r.yr].interest+=r.interest;byYear[r.yr].balance=r.balance;});
    thead.innerHTML='<tr><th>Year</th><th>Principal</th><th>Interest</th><th>Balance</th></tr>';
    tbody.innerHTML=Object.values(byYear).map(r=>`<tr><td>${r.yr}</td><td>${fmt(r.principal)}</td><td>${fmt(r.interest)}</td><td>${fmt(r.balance)}</td></tr>`).join('');
  }
}

// TOOL 4 — FINANCIAL HEALTH CHECK
// ════════════════════════════════════════
let hcOwns=true;
function setHcOwn(btn,owns){
  hcOwns=owns;
  document.querySelectorAll('#hc-own-seg button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('hc-equity-row').style.display=owns?'block':'none';
  calcHealth();
}
function retireBenchmark(age,income){
  const pts=[[30,1],[35,2],[40,3],[45,4],[50,6],[55,7],[60,8],[67,10]];
  if(age<=30)return income*pts[0][1];
  if(age>=67)return income*pts[pts.length-1][1];
  for(let i=1;i<pts.length;i++){
    if(age<=pts[i][0]){
      const [a0,m0]=pts[i-1],[a1,m1]=pts[i];
      const mult=m0+(m1-m0)*((age-a0)/(a1-a0));
      return income*mult;
    }
  }
  return income;
}
function nwBenchmark(age){
  if(age<=24)return 39000;
  if(age<=34)return 135600;
  if(age<=44)return 549600;
  if(age<=54)return 975800;
  if(age<=64)return 1566900;
  return 1794600;
}
function hcCard(title,val,sub,color,source){
  return `<div class="hc-card">
    <div class="hc-card-title">${title}</div>
    <div class="hc-card-val" style="color:${color==='green'?'#166534':color==='yellow'?'#854D0E':'#991B1B'}">${val}</div>
    <div class="hc-card-sub">${sub}</div>
    <div class="hc-source">${source}</div>
    <div class="t-indicator ${color}" style="margin-top:6px;margin-bottom:0;font-size:11px">${color==='green'?'✓ On Track':color==='yellow'?'⚠ Caution':'✗ Needs Attention'}</div>
  </div>`;
}
function calcHealth(){
  const age=parseInt(document.getElementById('hc-age').value)||0;
  const income=parseFloat(document.getElementById('hc-income').value)||0;
  const retire=parseFloat(document.getElementById('hc-retire').value)||0;
  const savings=parseFloat(document.getElementById('hc-savings').value)||0;
  const debt=parseFloat(document.getElementById('hc-debt').value)||0;
  const equity=hcOwns?(parseFloat(document.getElementById('hc-equity').value)||0):0;
  if(!age||!income){document.getElementById('hc-results').style.display='none';return;}
  document.getElementById('hc-results').style.display='block';
  const monthlyIncome=income/12;
  // Retirement
  const retireBench=retireBenchmark(age,income);
  const retireGap=retire-retireBench;
  const retireColor=retire>=retireBench?'green':retire>=retireBench*0.75?'yellow':'red';
  const retireCard=hcCard('Retirement Readiness',fmt(retire),
    retireGap>=0?`You are ${fmt(Math.abs(retireGap))} ahead of target.`:`You are ${fmt(Math.abs(retireGap))} behind target for age ${age}.`,
    retireColor,'Source: Fidelity Investments Retirement Savings Guidelines 2024');
  // Net worth
  const netWorth=retire+savings+equity;
  const nwBench=nwBenchmark(age);
  const nwGap=netWorth-nwBench;
  const nwColor=netWorth>=nwBench?'green':netWorth>=nwBench*0.75?'yellow':'red';
  const nwCard=hcCard('Net Worth Position',fmt(netWorth),
    nwGap>=0?`${fmt(Math.abs(nwGap))} above the median for your age.`:`${fmt(Math.abs(nwGap))} below the median for your age.`,
    nwColor,'Source: Federal Reserve Survey of Consumer Finances 2022');
  // Emergency fund
  const efMonths=savings/monthlyIncome;
  const efColor=efMonths>=6?'green':efMonths>=3?'yellow':'red';
  const efCard=hcCard('Emergency Fund',efMonths.toFixed(1)+' months',
    `CFPB recommends 3–6 months. You have ${efMonths.toFixed(1)} months covered.`,
    efColor,'Source: Consumer Financial Protection Bureau');
  // DTI
  const dti=(debt/monthlyIncome)*100;
  const dtiColor=dti<36?'green':dti<=43?'yellow':'red';
  const dtiCard=hcCard('Debt Load',fmtPct(dti)+' DTI',
    dti<36?'Healthy — under 36%':dti<=43?'Caution — 36–43% range':'High — above 43%',
    dtiColor,'Source: CFPB Qualified Mortgage Guidelines');
  document.getElementById('hc-grid').innerHTML=retireCard+nwCard+efCard+dtiCard;
  // Sage insight
  const insights=[];
  if(retireColor==='green')insights.push('Your retirement savings are tracking well for your age.');
  else if(retireColor==='yellow')insights.push('Your retirement savings are slightly behind the Fidelity benchmark — small consistent increases now make a big difference.');
  else insights.push('Your retirement savings have room to grow. Even modest increases now compound significantly over time.');
  if(dtiColor==='green')insights.push('Your debt load is healthy and supports homeownership eligibility.');
  else if(dtiColor==='yellow')insights.push(`At ${fmtPct(dti)} DTI, you're in the caution zone — reducing debt before applying for a mortgage will strengthen your position.`);
  else insights.push(`At ${fmtPct(dti)} DTI, debt is the biggest opportunity. Bringing this below 43% opens significant doors.`);
  if(efColor==='red')insights.push('Building your emergency fund to 3+ months would meaningfully reduce your financial risk.');
  document.getElementById('hc-insight').innerHTML=insights.join(' ');
  // Home callout
  const callout=document.getElementById('hc-home-callout');
  if(!hcOwns){
    callout.innerHTML=`<div class="t-callout"><strong>Homeownership is one of the most powerful wealth-building tools available.</strong> Your BuyReady Score shows you exactly what it would take to get there. No pressure. No spam calls. Just clarity.<br><br><button class="t-cta" style="margin-top:8px" onclick="closeTool('tool-health');openPopup()">Get My BuyReady Score →</button></div>`;
  } else {
    callout.innerHTML=`<div class="t-callout"><strong>Your home equity is a powerful asset.</strong> Keyloom can show you exactly how to use it wisely.<br><br><button class="t-cta" style="margin-top:8px" onclick="closeTool('tool-health');openTool('equity')">Check My Equity →</button></div>`;
  }
}
